<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CipherNet — The Dark Web of Knowledge</title>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-bg"></div>

<!-- LANDING PAGE -->
<div class="page active" id="page-landing">

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="sweep"></div>
  <div class="sweep"></div>

  <div class="logo-main flicker">CIPHERNET</div>

  <button class="btn-enter" onclick="showPage('signin')">
    ACCESS TERMINAL
  </button>

</div>

<!-- SIGNIN PAGE -->
<div class="page" id="page-signin">

  <div class="signin-panel">

    <div class="loading-bar" id="loadingBar"></div>

    <div class="signin-logo">CIPHERNET</div>

    <div class="form-group">
      <label class="form-label">USERNAME</label>
      <input class="form-input" type="text" id="username">
    </div>

    <div class="form-group">
      <label class="form-label">PASSWORD</label>
      <input class="form-input" type="password" id="password">
    </div>

    <button class="btn-signin" onclick="doSignin()" id="signinBtn">
      INITIATE SECURE LOGIN
    </button>

  </div>

</div>

<!-- FEED PAGE -->
<div class="page" id="page-feed">

  <nav class="topbar">
    <div class="topbar-logo">CIPHERNET</div>
  </nav>

  <main class="main-feed">

    <article class="post">
      <div class="post-title">
        Welcome to CipherNet
      </div>

      <div class="post-content">
        Your cyberpunk hacker interface is now active.
      </div>
    </article>

  </main>

</div>

<script src="script.js"></script>

</body>
</html>
